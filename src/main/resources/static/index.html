<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGAD Platform - 内容生成与数据处理平台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">CGAD Platform</h1>
                <p class="app-subtitle">内容生成与数据处理平台</p>
            </div>
        </header>

        <nav class="app-nav">
            <button class="nav-btn active" data-tab="document">智能文档分析</button>
            <button class="nav-btn" data-tab="translation">多语言翻译与润色</button>
        </nav>

        <main class="app-main">
            <section id="document-section" class="tab-content active">
                <div class="section-header">
                    <h2>智能文档分析器</h2>
                    <p>上传研报或合同，自动生成摘要、提取关键条款并输出结构化数据</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>输入文档</h3>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <label for="doc-content">文档内容</label>
                            <textarea id="doc-content" rows="12" placeholder="请粘贴研报或合同内容..."></textarea>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="doc-type">文档类型（可选）</label>
                                <select id="doc-type">
                                    <option value="">自动识别</option>
                                    <option value="合同">合同</option>
                                    <option value="研报">研究报告</option>
                                    <option value="协议">协议</option>
                                    <option value="公告">公告</option>
                                </select>
                            </div>
                        </div>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" id="extract-clauses" checked>
                                提取关键条款
                            </label>
                            <label>
                                <input type="checkbox" id="generate-summary" checked>
                                生成摘要
                            </label>
                        </div>
                        <div class="button-group">
                            <button id="analyze-btn" class="btn btn-primary">开始分析</button>
                            <button id="export-btn" class="btn btn-secondary" disabled>导出Excel</button>
                        </div>
                    </div>
                </div>

                <div id="doc-result" class="card result-card" style="display: none;">
                    <div class="card-header">
                        <h3>分析结果</h3>
                    </div>
                    <div class="card-body">
                        <div class="result-section">
                            <h4>文档摘要</h4>
                            <p id="result-summary"></p>
                        </div>
                        <div class="result-section">
                            <h4>文档类型</h4>
                            <p id="result-type"></p>
                        </div>
                        <div class="result-section">
                            <h4>关键条款</h4>
                            <table id="clauses-table" class="data-table">
                                <thead>
                                    <tr>
                                        <th>条款类型</th>
                                        <th>条款内容</th>
                                        <th>具体数值</th>
                                        <th>位置</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="result-section">
                            <h4>关键要点</h4>
                            <ul id="result-points" class="points-list"></ul>
                        </div>
                        <div class="result-section">
                            <h4>风险评估</h4>
                            <p id="result-risk"></p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="translation-section" class="tab-content">
                <div class="section-header">
                    <h2>多语言翻译与润色</h2>
                    <p>针对特定行业术语进行高质量的文本翻译或润色</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>翻译设置</h3>
                    </div>
                    <div class="card-body">
                        <div class="input-row">
                            <div class="input-group">
                                <label for="source-lang">源语言</label>
                                <select id="source-lang">
                                    <option value="auto">自动检测</option>
                                    <option value="zh">中文</option>
                                    <option value="en">英语</option>
                                    <option value="ja">日语</option>
                                    <option value="ko">韩语</option>
                                    <option value="fr">法语</option>
                                    <option value="de">德语</option>
                                    <option value="es">西班牙语</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label for="target-lang">目标语言</label>
                                <select id="target-lang">
                                    <option value="en">英语</option>
                                    <option value="zh">中文</option>
                                    <option value="ja">日语</option>
                                    <option value="ko">韩语</option>
                                    <option value="fr">法语</option>
                                    <option value="de">德语</option>
                                    <option value="es">西班牙语</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="domain">专业领域（可选）</label>
                                <select id="domain">
                                    <option value="">通用</option>
                                    <option value="跨境电商">跨境电商</option>
                                    <option value="金融">金融</option>
                                    <option value="法律">法律</option>
                                    <option value="医学">医学</option>
                                    <option value="科技">科技</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label for="style">输出风格（可选）</label>
                                <select id="style">
                                    <option value="">默认</option>
                                    <option value="正式">正式</option>
                                    <option value="口语化">口语化</option>
                                    <option value="学术">学术</option>
                                    <option value="简洁">简洁</option>
                                </select>
                            </div>
                        </div>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" id="polish-mode">
                                启用润色模式（翻译后进行润色优化）
                            </label>
                        </div>
                    </div>
                </div>

                <div class="translation-panel">
                    <div class="panel-half">
                        <div class="panel-header">
                            <span>原文</span>
                            <span id="char-count">0 字符</span>
                        </div>
                        <textarea id="source-text" placeholder="请输入需要翻译的文本..."></textarea>
                    </div>
                    <div class="panel-actions">
                        <button id="swap-lang" class="btn-icon" title="交换语言">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path fill="currentColor" d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="panel-half">
                        <div class="panel-header">
                            <span>译文</span>
                            <span id="detected-lang"></span>
                        </div>
                        <textarea id="target-text" readonly placeholder="翻译结果将显示在这里..."></textarea>
                    </div>
                </div>

                <div class="button-group center">
                    <button id="translate-btn" class="btn btn-primary">翻译</button>
                    <button id="copy-btn" class="btn btn-secondary" disabled>复制结果</button>
                </div>

                <div id="glossary-notes" class="card" style="display: none;">
                    <div class="card-header">
                        <h3>术语说明</h3>
                    </div>
                    <div class="card-body">
                        <ul id="notes-list" class="notes-list"></ul>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>CGAD Platform v1.0.0 | Powered by LangChain4j</p>
        </footer>
    </div>

    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p>处理中，请稍候...</p>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
